<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viniii Scoop Catch</title>
    <style>
        :root {
            --primary: #ff4081;
            --accent: #e91e63;
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff9eb7 0%, #ff6b9d 100%);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none;
        }

        header {
            padding: 16px 20px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo { font-size: 1.85rem; font-weight: 800; color: var(--primary); }

        .settings-btn {
            width: 48px; height: 48px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 24px;
            cursor: pointer;
        }

        .stats {
            display: flex; justify-content: space-around; padding: 14px 10px;
            background: var(--glass); backdrop-filter: blur(25px);
        }

        .stat-value { font-size: 2.1rem; font-weight: 700; color: var(--primary); }

        #game-container { position: relative; flex: 1; background: linear-gradient(to bottom, #fff5f8, #ffe4ef); overflow: hidden; }

        canvas { display: block; width: 100%; height: 100%; }

        /* Settings UI */
        #settingsOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .settings-card {
            background: white; padding: 30px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center;
        }
        .diff-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid var(--primary); border-radius: 10px; background: none; font-weight: bold;
        }
        .diff-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="settingsOverlay">
    <div class="settings-card">
        <h2 style="color:var(--primary); margin-bottom: 15px;">Difficulty</h2>
        <button class="diff-btn" id="easyBtn" onclick="setDifficulty('easy')">Easy</button>
        <button class="diff-btn active" id="mediumBtn" onclick="setDifficulty('medium')">Medium</button>
        <button class="diff-btn" id="hardBtn" onclick="setDifficulty('hard')">Hard</button>
        <button onclick="toggleSettings()" style="margin-top: 15px; border: none; background: none; color: #666;">Close</button>
    </div>
</div>

<div id="startOverlay" style="position:fixed;inset:0;background:rgba(255,240,245,0.95);backdrop-filter:blur(30px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:25px;">
    <h1 style="font-size:4.2rem;color:var(--primary);">Viniii 🍦</h1>
    <p style="font-size:1.4rem;color:#555;">Catch the falling scoops!</p>
    <button onclick="startGame()" style="padding:18px 70px;font-size:1.8rem;font-weight:700;background:linear-gradient(45deg,var(--primary),var(--accent));color:white;border:none;border-radius:50px;cursor:pointer;">START GAME</button>
</div>

<header>
    <div class="logo">Viniii Scoop</div>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
</header>

<div class="stats">
    <div class="stat">Score <span id="score" class="stat-value">0</span></div>
    <div class="stat">Lives <span id="lives" class="stat-value">5</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="vini-popup" style="position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:6.8rem;font-weight:900;background:linear-gradient(90deg,#ff4081,#ff1493);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 50px rgba(255,255,255,0.9);pointer-events:none;z-index:300;opacity:0;transition:all 0.55s cubic-bezier(0.175,0.885,0.32,1.8);">VINIII!</div>
</div>

<div id="overlay" style="position:fixed;inset:0;background:rgba(255,240,245,0.95);backdrop-filter:blur(30px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:25px;">
    <h1 style="font-size:3.2rem;color:var(--primary);">Game Over</h1>
    <p style="font-size:1.4rem;">Final Score: <strong id="finalScore">0</strong></p>
    <button onclick="restartGame()" style="padding:18px 70px;font-size:1.8rem;font-weight:700;background:linear-gradient(45deg,var(--primary),var(--accent));color:white;border:none;border-radius:50px;cursor:pointer;">PLAY AGAIN</button>
</div>

<audio id="bgAudio" loop preload="auto">
    <source src="background audio viniii .mp3" type="audio/mpeg">
</audio>
<audio id="catchAudio" preload="auto">
    <source src="viniii.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const popup = document.getElementById('vini-popup');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverlay = document.getElementById('overlay');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalScoreEl = document.getElementById('finalScore');
    const bgAudio = document.getElementById('bgAudio');
    const catchAudio = document.getElementById('catchAudio');

    let w, h, score = 0, lives = 5, active = false;
    let scoops = [], coneX = 0;
    let difficulty = "medium";

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight - (document.querySelector('header').offsetHeight + document.querySelector('.stats').offsetHeight);
        coneX = w / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    function getBaseSpeed() {
        if (difficulty === "easy") return 2.2;
        if (difficulty === "hard") return 4.5;
        return 3.2;
    }

    class Scoop {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * (w - 70) + 35;
            this.y = -60;
            this.speed = getBaseSpeed() + Math.floor(score / 10) * 0.5 + Math.random() * 0.5;
            this.r = 26;
            this.hue = Math.random() * 360;
        }
    }

    function drawRealisticScoop(s) {
        const grad = ctx.createRadialGradient(s.x - 6, s.y - 9, 6, s.x + 4, s.y + 7, s.r + 4);
        grad.addColorStop(0, `hsl(${s.hue}, 85%, 88%)`);
        grad.addColorStop(0.7, `hsl(${s.hue}, 78%, 76%)`);
        grad.addColorStop(1, `hsl(${s.hue}, 70%, 65%)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.arc(s.x - 7, s.y - 7, 8, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawRealisticCone() {
        const topY = h - 60;
        ctx.fillStyle = "#f8d9a0";
        ctx.beginPath();
        ctx.moveTo(coneX - 40, topY);
        ctx.lineTo(coneX + 40, topY);
        ctx.lineTo(coneX, topY + 90);
        ctx.fill();
    }

    function playCatchEffect() {
        catchAudio.currentTime = 0;
        catchAudio.play().catch(() => {});
        popup.style.opacity = "1";
        popup.style.transform = "translate(-50%, -50%) scale(1.3)";
        setTimeout(() => {
            popup.style.opacity = "0";
            popup.style.transform = "translate(-50%, -50%) scale(0.6)";
        }, 500);
    }

    const moveCone = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        coneX = Math.max(40, Math.min(w - 40, clientX));
    };
    window.addEventListener('mousemove', moveCone);
    window.addEventListener('touchmove', moveCone, { passive: true });

    function toggleSettings() {
        settingsOverlay.style.display = settingsOverlay.style.display === 'flex' ? 'none' : 'flex';
    }

    function setDifficulty(lvl) {
        difficulty = lvl;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(lvl + 'Btn').classList.add('active');
        toggleSettings();
    }

    function startGame() {
        startOverlay.style.display = "none";
        bgAudio.play().catch(() => {});
        score = 0;
        lives = 5;
        scoops = [];
        scoreEl.textContent = 0;
        livesEl.textContent = lives;
        active = true;
        loop();
    }

    function gameOver() {
        active = false;
        bgAudio.pause();
        finalScoreEl.textContent = score;
        gameOverlay.style.display = "flex";
    }

    function restartGame() {
        gameOverlay.style.display = "none";
        startOverlay.style.display = "flex";
        bgAudio.currentTime = 0;
    }

    function loop() {
        if (!active) return;
        ctx.clearRect(0, 0, w, h);

        if (scoops.length === 0 || (scoops.length < 3 && Math.random() < 0.015)) {
            scoops.push(new Scoop());
        }

        for (let i = scoops.length - 1; i >= 0; i--) {
            const s = scoops[i];
            s.y += s.speed;
            drawRealisticScoop(s);

            if (s.y > h - 100 && Math.abs(s.x - coneX) < 60) {
                score++;
                scoreEl.textContent = score;
                playCatchEffect();
                scoops.splice(i, 1);
            } else if (s.y > h + 40) {
                lives--;
                livesEl.textContent = lives;
                scoops.splice(i, 1);
                if (lives <= 0) gameOver();
            }
        }
        drawRealisticCone();
        requestAnimationFrame(loop);
    }

    window.onload = resize;
</script>
</body>
</html>
